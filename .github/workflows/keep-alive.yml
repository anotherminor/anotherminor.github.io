name: Supabase Keep Alive

on:
  schedule:
    - cron: "17 1 * * 1,4"  # 매주 월·목 KST 10:17
  workflow_dispatch:         # Actions 탭에서 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ping Supabase RPC
        run: |
          curl --fail --silent --show-error \
            -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/keep_alive" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Touch activity file
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last-run.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last-run.txt
          git commit -m "chore: keep-alive ping" || exit 0
          git push