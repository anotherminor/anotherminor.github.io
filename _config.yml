locale: ko-KR
title: anotherminor의 블로그
description: 부끄러운 민낯의 정수.
name: anotherminor
url: ""
baseurl: ""
timezone: Asia/Seoul

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/

include:
  - _pages

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - AGENTS.md
  - .MWebMetaData
  - .bundle
  - .jekyll-cache
  - .sass-cache
  - vendor
  - node_modules
  - MWebLibrary

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# GitHub Pages safe-mode compatibility
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

comments:
  provider: disqus
  disqus:
    shortname: anotherminor

author:
  name: anotherminor
  avatar: /assets/images/bio-photo.jpg
  bio: 부끄러운 민낯의 정수.
  email: anotherminor.kr@gmail.com
  links:
    - label: Instagram
      url: https://instagram.com/anotherminor
    - label: YouTube
      url: https://www.youtube.com/@anotherminor

footer:
  links:
    - label: Instagram
      url: https://instagram.com/anotherminor

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      show_date: true
      comments: true
