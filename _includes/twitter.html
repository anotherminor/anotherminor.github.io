{% assign tweet_url = include.url | default: "" %}
{% if tweet_url == "" and include.user and include.id %}
  {% assign tweet_url = "https://x.com/" | append: include.user | append: "/status/" | append: include.id %}
{% endif %}

{% if tweet_url != "" %}
<div class="embed">
  <blockquote class="twitter-tweet"><a href="{{ tweet_url }}"></a></blockquote>
</div>
{% endif %}
