{% assign post_url = include.url | default: "" %}

{% if post_url != "" %}
<div class="embed embed--narrow">
  <iframe
    src="https://www.facebook.com/plugins/post.php?href={{ post_url | url_encode }}&show_text=true&width=560"
    title="Facebook post"
    frameborder="0"
    scrolling="no"
    allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"
    allowfullscreen
  ></iframe>
</div>
{% endif %}
