---
layout: default
---

<article class="page">
  <header>
    <h1>{{ page.title }}</h1>
    <div class="meta">
      {{ page.date | date: "%Y-%m-%d" }}
      {% if page.categories %}
        · {{ page.categories | join: ", " }}
      {% endif %}
      {% if page.tags %}
        · #{{ page.tags | join: " #" }}
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  {% if page.comments %}
    {% include comments.html %}
  {% endif %}
</article>
