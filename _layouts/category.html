---
layout: default
---

<section class="page">
  <header>
    <h1>{{ page.title }}</h1>
  </header>

  {% assign category_posts = site.categories[page.title] %}
  <div class="post-list">
    {% for post in category_posts %}
      <article class="post-card">
        <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
        <div class="meta">{{ post.date | date: "%Y-%m-%d" }}</div>
      </article>
    {% endfor %}
  </div>
</section>
